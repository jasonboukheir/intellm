# Meta Llama 3.1 8B — single GPU config for Arc Pro B70 (32GB)
# Model fits comfortably in BF16 (~16GB) with room for KV cache

model: meta-llama/Llama-3.1-8B-Instruct
dtype: bfloat16
device: xpu
tensor_parallel_size: 1
max_model_len: 8192
gpu_memory_utilization: 0.90

# Baseline: no custom quantization
# Override with --kv-cache-dtype for built-in FP8 KV cache
# Or use xpu-kvcache-quant adapter for TurboQuant/RotorQuant

served_model_name: llama-3.1-8b

# vLLM serving parameters
max_num_seqs: 32
enable_chunked_prefill: true
